
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Backteste — Método Oliver Velez</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f0f4f8;color:#1e293b;font-family:'Outfit',sans-serif;min-height:100vh;}
  #header{background:#0f172a;padding:16px 28px;display:flex;align-items:center;gap:12px;}
  #header h1{color:#fff;font-size:16px;font-weight:700;}
  #header span{color:#64748b;font-size:12px;}
  .page{padding:24px 28px;max-width:1100px;margin:0 auto;}

  /* SETUP SELECTOR */
  .setup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:28px;}
  .setup-btn{padding:10px 12px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;color:#64748b;}
  .setup-btn:hover{border-color:#2563eb;color:#2563eb;}
  .setup-btn.active{border-color:#2563eb;background:#2563eb;color:#fff;}

  /* CONTROLS */
  .controls{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  .btn-primary{background:linear-gradient(135deg,#2563eb,#6366f1);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;}
  .btn-primary:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed;}
  #status{font-size:12px;color:#94a3b8;}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
  .stat-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid #f1f5f9;}
  .stat-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .stat-value{font-size:22px;font-weight:700;color:#0f172a;}
  .stat-sub{font-size:11px;color:#94a3b8;margin-top:3px;}

  /* TABLE */
  .table-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  .table-header{background:#0f172a;padding:12px 20px;display:flex;align-items:center;gap:10px;}
  .table-header span{color:#fff;font-size:13px;font-weight:700;}
  table{width:100%;border-collapse:collapse;}
  th{background:#f8fafc;padding:10px 14px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;text-align:left;border-bottom:1px solid #f1f5f9;}
  td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#f8fafc;}

  /* RESULT BUTTONS */
  .res-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:2px solid;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;}
  .res-btn.win2  {border-color:#7c3aed;color:#7c3aed;background:#fdf4ff;}
  .res-btn.win2.active{background:#7c3aed;color:#fff;}
  .res-btn.win1  {border-color:#16a34a;color:#16a34a;background:#f0fdf4;}
  .res-btn.win1.active{background:#16a34a;color:#fff;}
  .res-btn.loss  {border-color:#dc2626;color:#dc2626;background:#fef2f2;}
  .res-btn.loss.active{background:#dc2626;color:#fff;}
  .res-btn.be    {border-color:#d97706;color:#d97706;background:#fffbeb;}
  .res-btn.be.active{background:#d97706;color:#fff;}

  .loc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .empty{text-align:center;padding:48px;color:#94a3b8;font-size:13px;}

  #progress-bar{height:3px;background:#e2e8f0;}
  #progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:width .3s;}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>📊 Backteste — Método Oliver Velez</h1>
    <span>XAU/USD · M5 · Apuração manual</span>
  </div>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div class="page">

  <!-- SETUP SELECTOR -->
  <div style="margin-bottom:14px;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;font-weight:600;">Selecione o Setup</div>
  <div class="setup-grid" id="setup-grid"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn-primary" id="btn-buscar" onclick="buscarDados()">🔍 Buscar Ocorrências</button>
    <button class="btn-primary" onclick="exportarCSV()" style="background:linear-gradient(135deg,#16a34a,#15803d);">📥 Exportar CSV</button>
    <button class="btn-primary" onclick="limparResultados()" style="background:#e2e8f0;color:#64748b;box-shadow:none;">🗑 Limpar resultados</button>
    <span id="status">Selecione um setup e clique em Buscar</span>
  </div>

  <!-- STATS -->
  <div class="stats-grid" id="stats-grid" style="display:none;"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header">
      <span>📋 Ocorrências</span>
      <span id="table-count" style="margin-left:auto;font-size:11px;color:#64748b;"></span>
    </div>
    <div id="table-body">
      <div class="empty">Selecione um setup e clique em Buscar para ver as ocorrências</div>
    </div>
  </div>

</div>

<script>
const API_KEY = "623474460dfb40f392a9e6907bfba8ea";

const SETUPS_LIST = [
  {id:"BE_BULL",      name:"🐘 BE Bull",         color:"#16a34a"},
  {id:"BE_BEAR",      name:"🐘 BE Bear",         color:"#dc2626"},
  {id:"BULL_180",     name:"🔄 Bull 180",        color:"#16a34a"},
  {id:"BEAR_180",     name:"🔄 Bear 180",        color:"#dc2626"},
  {id:"BT",           name:"📍 BT",              color:"#16a34a"},
  {id:"TT",           name:"📍 TT",              color:"#dc2626"},
  {id:"NRB",          name:"🔬 NRB",             color:"#7c3aed"},
  {id:"GBR",          name:"🟢 GBR",             color:"#16a34a"},
  {id:"RBR",          name:"🔴 RBR",             color:"#dc2626"},
  {id:"RBTO",         name:"📈 RBTO",            color:"#16a34a"},
  {id:"GBTO",         name:"📉 GBTO",            color:"#dc2626"},
  {id:"RBI",          name:"🚫🔴 RBI",           color:"#16a34a"},
  {id:"GBI",          name:"🚫🟢 GBI",           color:"#dc2626"},
  {id:"2CORES_BULL",  name:"2️⃣ 2 Cores Bull",   color:"#16a34a"},
  {id:"2CORES_BEAR",  name:"2️⃣ 2 Cores Bear",   color:"#dc2626"},
  {id:"DUPLA_FUNDO",  name:"👥 Dupla Fundo",     color:"#16a34a"},
  {id:"DUPLA_TOPO",   name:"👥 Dupla Topo",      color:"#dc2626"},
  {id:"MARCH_BULL",   name:"🟢🟢🟢 March Bull",  color:"#16a34a"},
  {id:"MARCH_BEAR",   name:"🔴🔴🔴 March Bear",  color:"#dc2626"},
  {id:"TTTO",         name:"⬆️ TTTO",            color:"#16a34a"},
  {id:"BTTO",         name:"⬇️ BTTO",            color:"#dc2626"},

  {id:"GBR_VBS",      name:"🟢 GBR→VBS",        color:"#16a34a"},
  {id:"RBR_VSS",      name:"🔴 RBR→VSS",        color:"#dc2626"},
];

let selectedSetup = null;
let ocorrencias   = [];
let resultados    = JSON.parse(localStorage.getItem("bt_resultados")||"{}");

// ─── RENDER SETUP GRID ────────────────────────────────────────────────────────
function renderSetupGrid(){
  document.getElementById("setup-grid").innerHTML = SETUPS_LIST.map(s=>`
    <button class="setup-btn ${selectedSetup===s.id?'active':''}"
      onclick="selectSetup('${s.id}')"
      style="${selectedSetup===s.id?`border-color:${s.color};background:${s.color};`:`border-color:#e2e8f0;`}">
      ${s.name}
    </button>`).join("");
}

function selectSetup(id){
  selectedSetup = id;
  renderSetupGrid();
  document.getElementById("status").textContent = "Setup selecionado. Clique em Buscar.";
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function tdFetch(sym, interval, size){
  const r = await fetch(`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=${interval}&outputsize=${size}&apikey=${API_KEY}&dp=6`);
  if(!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json();
  if(j.status==="error") throw new Error(j.message);
  return j.values.reverse();
}

// ─── MATH ─────────────────────────────────────────────────────────────────────
function calcSMA(arr,p){ if(!arr||arr.length<p)return null; return arr.slice(-p).reduce((a,b)=>a+b,0)/p; }
const body   = v => Math.abs(v.close-v.open);
const rng    = v => v.high-v.low;
const isBull = v => v.close>v.open;
const isBear = v => v.close<v.open;
const tailD  = v => Math.min(v.open,v.close)-v.low;
const tailU  = v => v.high-Math.max(v.open,v.close);

function getLOC(price, s8, s20){
  if(!s8||!s20) return null;
  const d8=Math.abs((price-s8)/s8*100), d20=Math.abs((price-s20)/s20*100);
  if(d8<0.3&&d20<0.5) return 1;
  if(d8>=0.3&&d20<0.5) return 2;
  if(d8<0.3&&d20>=0.5) return 3;
  if(d20>1.5) return 4;
  return 5;
}

const LOC_COLORS = {1:"#16a34a",2:"#2563eb",3:"#d97706",4:"#7c3aed",5:"#94a3b8"};

// ─── DETECT SETUP ─────────────────────────────────────────────────────────────
function detectSetup(id, candles, i){
  if(i < 5) return false;
  const c=candles[i], p1=candles[i-1], p2=candles[i-2], p3=candles[i-3], p4=candles[i-4];
  const slice = candles.slice(Math.max(0,i-20),i);
  const avgB  = slice.reduce((s,v)=>s+body(v),0)/slice.length;
  const avgR  = slice.reduce((s,v)=>s+rng(v),0)/slice.length;
  const closes= candles.slice(0,i+1).map(v=>v.close);
  const sma8  = calcSMA(closes,8);
  const sma20 = calcSMA(closes,20);

  switch(id){
    case "BE_BULL":   return isBull(c) && body(c)>=avgB*3;
    case "BE_BEAR":   return isBear(c) && body(c)>=avgB*3;
    case "BULL_180":  return isBear(p1)&&isBull(c)&&body(p1)>avgB*0.5&&body(c)>avgB*0.5;
    case "BEAR_180":  return isBull(p1)&&isBear(c)&&body(p1)>avgB*0.5&&body(c)>avgB*0.5;
    case "BT":        return rng(c)>0 && tailD(c)/rng(c)>=0.66;
    case "TT":        return rng(c)>0 && tailU(c)/rng(c)>=0.66;
    case "NRB":       return rng(c)<avgR*0.3;
    case "GBR":       return isBull(c)&&([p1,p2,p3].filter(v=>isBear(v)).length>=2);
    case "RBR":       return isBear(c)&&([p1,p2,p3].filter(v=>isBull(v)).length>=2);
    case "RBTO":      return isBear(p1)&&isBull(c)&&c.close>p1.high;
    case "GBTO":      return isBull(p1)&&isBear(c)&&c.close<p1.low;
    case "RBI":       return isBear(p1)&&body(p1)<avgB*0.5&&isBull(c)&&c.close>p1.high;
    case "GBI":       return isBull(p1)&&body(p1)<avgB*0.5&&isBear(c)&&c.close<p1.low;
    case "2CORES_BULL": return isBear(p2)&&isBear(p1)&&body(p2)>avgB&&body(p1)>avgB&&isBull(c)&&c.close>p1.high;
    case "2CORES_BEAR": return isBull(p2)&&isBull(p1)&&body(p2)>avgB&&body(p1)>avgB&&isBear(c)&&c.close<p1.low;
    case "DUPLA_FUNDO": return isBear(p1)&&isBear(c)&&c.low<p1.low&&tailD(c)/rng(c)>=0.3&&tailD(p1)/rng(p1)>=0.3;
    case "DUPLA_TOPO":  return isBull(p1)&&isBull(c)&&c.high>p1.high&&tailU(c)/rng(c)>=0.3&&tailU(p1)/rng(p1)>=0.3;
    case "MARCH_BULL":  return isBull(c)&&isBull(p1)&&isBull(p2)&&body(c)>avgB*0.5;
    case "MARCH_BEAR":  return isBear(c)&&isBear(p1)&&isBear(p2)&&body(c)>avgB*0.5;
    case "TTTO":  return rng(p1)>0&&tailU(p1)/rng(p1)>=0.66&&c.close>p1.high;
    case "BTTO":  return rng(p1)>0&&tailD(p1)/rng(p1)>=0.66&&c.close<p1.low;

    case "GBR_VBS": return isBull(c)&&([p1,p2].filter(v=>isBear(v)).length>=2)&&sma20&&c.close>sma20;
    case "RBR_VSS": return isBear(c)&&([p1,p2].filter(v=>isBull(v)).length>=2)&&sma20&&c.close<sma20;
    default: return false;
  }
}

// ─── BUSCAR ───────────────────────────────────────────────────────────────────
async function yahooFetchM5(){
  const urls = [
    "https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?interval=5m&range=5d",
    "https://query2.finance.yahoo.com/v8/finance/chart/GC%3DF?interval=5m&range=5d",
  ];
  for(const url of urls){
    try{
      const r = await fetch(url);
      if(!r.ok) continue;
      const j = await r.json();
      const res = j?.chart?.result?.[0];
      if(!res) continue;
      const ts = res.timestamp;
      const q  = res.indicators.quote[0];
      const candles = [];
      for(let i=0;i<ts.length;i++){
        if(!q.close[i]) continue;
        const dt = new Date(ts[i]*1000);
        const pad = n=>String(n).padStart(2,"0");
        candles.push({
          datetime:`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`,
          open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i],
        });
      }
      if(candles.length > 10) return candles;
    }catch(e){ continue; }
  }
  throw new Error("Yahoo M5: falhou. Tente novamente.");
}

async function buscarDados(){
  if(!selectedSetup){ alert("Selecione um setup primeiro!"); return; }
  const btn = document.getElementById("btn-buscar");
  const fill = document.getElementById("progress-fill");
  btn.disabled = true;
  document.getElementById("status").textContent = "Buscando dados...";
  fill.style.width = "30%";

  try{
    // Yahoo Finance via proxy — M5, 30 dias (sem limite)
    const raw = await yahooFetchM5();
    fill.style.width = "70%";

    const candles = raw.map(v=>({
      datetime: v.datetime,
      open:  parseFloat(v.open),
      high:  parseFloat(v.high),
      low:   parseFloat(v.low),
      close: parseFloat(v.close),
    }));

    ocorrencias = [];
    for(let i=5; i<candles.length; i++){
      if(detectSetup(selectedSetup, candles, i)){
        const closes = candles.slice(0,i+1).map(v=>v.close);
        const sma8   = calcSMA(closes,8);
        const sma20  = calcSMA(closes,20);
        const loc    = getLOC(candles[i].close, sma8, sma20);
        ocorrencias.push({
          idx: i,
          datetime: candles[i].datetime,
          price: candles[i].close,
          high:  candles[i].high,
          low:   candles[i].low,
          loc,
          sma8:  sma8?sma8.toFixed(2):null,
          sma20: sma20?sma20.toFixed(2):null,
        });
      }
    }

    fill.style.width = "100%";
    document.getElementById("status").textContent = `${ocorrencias.length} ocorrências encontradas (M5 Yahoo, ~30 dias)`;
    setTimeout(()=>fill.style.width="0%",800);
    renderTable();
    renderStats();
  }catch(e){
    document.getElementById("status").textContent = "Erro: "+e.message;
  }
  btn.disabled = false;
}

// ─── RESULTADO ────────────────────────────────────────────────────────────────
function setResult(key, result){
  if(!resultados[key]) resultados[key]={};
  if(resultados[key].result === result){
    delete resultados[key];
  } else {
    resultados[key] = {result};
  }
  localStorage.setItem("bt_resultados", JSON.stringify(resultados));
  renderTable();
  renderStats();
}

// ─── RENDER TABLE ─────────────────────────────────────────────────────────────
function renderTable(){
  const setup = SETUPS_LIST.find(s=>s.id===selectedSetup);
  document.getElementById("table-count").textContent = ocorrencias.length+" ocorrências";

  if(!ocorrencias.length){
    document.getElementById("table-body").innerHTML = '<div class="empty">Nenhuma ocorrência encontrada para este setup</div>';
    return;
  }

  const locColors = LOC_COLORS;

  document.getElementById("table-body").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Data / Hora</th>
          <th>Preço</th>
          <th>LOC</th>
          <th>MM8</th>
          <th>MM20</th>
          <th>Resultado</th>
        </tr>
      </thead>
      <tbody>
        ${ocorrencias.map((o,i)=>{
          const key = `${selectedSetup}_${o.datetime}`;
          const res = resultados[key]?.result;
          const resColor = res==="2x1"?"#7c3aed":res==="1x1"?"#16a34a":res==="loss"?"#dc2626":res==="be"?"#d97706":"";
          return `<tr>
            <td style="color:#94a3b8;font-weight:600;">${i+1}</td>
            <td style="font-size:12px;">${o.datetime}</td>
            <td style="font-weight:700;">${o.price.toFixed(2)}</td>
            <td>${o.loc?`<span class="loc-badge" style="background:${locColors[o.loc]}22;color:${locColors[o.loc]};">LOC${o.loc}</span>`:"—"}</td>
            <td style="font-size:12px;color:#64748b;">${o.sma8||"—"}</td>
            <td style="font-size:12px;color:#64748b;">${o.sma20||"—"}</td>
            <td>
              <div style="display:flex;gap:6px;flex-wrap:wrap;">
                <button class="res-btn win2 ${res==='2x1'?'active':''}" onclick="setResult('${key}','2x1')">2x1</button>
                <button class="res-btn win1 ${res==='1x1'?'active':''}" onclick="setResult('${key}','1x1')">1x1</button>
                <button class="res-btn be ${res==='be'?'active':''}" onclick="setResult('${key}','be')">BE</button>
                <button class="res-btn loss ${res==='loss'?'active':''}" onclick="setResult('${key}','loss')">Loss</button>
              </div>
            </td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`;
}

// ─── RENDER STATS ─────────────────────────────────────────────────────────────
function renderStats(){
  const keys = ocorrencias.map(o=>`${selectedSetup}_${o.datetime}`);
  const apurados = keys.filter(k=>resultados[k]);
  const win2  = keys.filter(k=>resultados[k]?.result==="2x1").length;
  const win1  = keys.filter(k=>resultados[k]?.result==="1x1").length;
  const be = 0;
  const loss  = keys.filter(k=>resultados[k]?.result==="loss").length;
  const total = apurados.length;
  const wins  = win2+win1;
  const pct   = total>0?((wins/total)*100).toFixed(1):0;

  // LOC breakdown
  const locStats = {};
  ocorrencias.forEach((o,i)=>{
    const key = `${selectedSetup}_${o.datetime}`;
    const res = resultados[key]?.result;
    if(!res) return;
    const l = o.loc||5;
    if(!locStats[l]) locStats[l]={w:0,l:0,be:0};
    if(res==="2x1"||res==="1x1") locStats[l].w++;
    else if(res==="loss") locStats[l].l++;

  });

  const statsEl = document.getElementById("stats-grid");
  statsEl.style.display = "grid";
  statsEl.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Ocorrências</div>
      <div class="stat-value">${ocorrencias.length}</div>
      <div class="stat-sub">${apurados.length} apuradas</div>
    </div>
    <div class="stat-card" style="border-color:#16a34a44;">
      <div class="stat-label">% Acerto</div>
      <div class="stat-value" style="color:${pct>=50?'#16a34a':'#dc2626'};">${pct}%</div>
      <div class="stat-sub">${wins} ganhos de ${total}</div>
    </div>
    <div class="stat-card" style="border-color:#7c3aed44;">
      <div class="stat-label">2x1</div>
      <div class="stat-value" style="color:#7c3aed;">${win2}</div>
      <div class="stat-sub">${total>0?((win2/total)*100).toFixed(0):0}% dos apurados</div>
    </div>
    <div class="stat-card" style="border-color:#16a34a44;">
      <div class="stat-label">1x1</div>
      <div class="stat-value" style="color:#16a34a;">${win1}</div>
      <div class="stat-sub">${total>0?((win1/total)*100).toFixed(0):0}% dos apurados</div>
    </div>

    <div class="stat-card" style="border-color:#dc262644;">
      <div class="stat-label">Loss</div>
      <div class="stat-value" style="color:#dc2626;">${loss}</div>
      <div class="stat-sub">${total>0?((loss/total)*100).toFixed(0):0}% dos apurados</div>
    </div>
    ${[1,2,3,4,5].filter(l=>locStats[l]).map(l=>{
      const s=locStats[l]; const t=s.w+s.l+s.be;
      return `<div class="stat-card">
        <div class="stat-label" style="color:${LOC_COLORS[l]};">LOC ${l}</div>
        <div class="stat-value" style="color:${LOC_COLORS[l]};">${t>0?((s.w/t)*100).toFixed(0):0}%</div>
        <div class="stat-sub">${s.w}G · ${s.l}L</div>
      </div>`;
    }).join("")}
  `;
}

// ─── EXPORT CSV ───────────────────────────────────────────────────────────────
function exportarCSV(){
  if(!ocorrencias.length){ alert("Busque os dados primeiro."); return; }
  const setup = SETUPS_LIST.find(s=>s.id===selectedSetup);
  let csv = "Setup,Data,Hora,Preco,LOC,MM8,MM20,Resultado\n";
  ocorrencias.forEach(o=>{
    const key = `${selectedSetup}_${o.datetime}`;
    const res = resultados[key]?.result||"";
    const [date,time] = o.datetime.split(" ");
    csv += `${setup.name},${date},${time},${o.price.toFixed(2)},${o.loc||""},${o.sma8||""},${o.sma20||""},${res}\n`;
  });
  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `backteste_${selectedSetup}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function limparResultados(){
  if(!confirm("Limpar todos os resultados apurados?")) return;
  const keys = ocorrencias.map(o=>`${selectedSetup}_${o.datetime}`);
  keys.forEach(k=>delete resultados[k]);
  localStorage.setItem("bt_resultados", JSON.stringify(resultados));
  renderTable();
  renderStats();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSetupGrid();
</script>
